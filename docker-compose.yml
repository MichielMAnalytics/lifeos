services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://lifeos:${DB_PASSWORD:-lifeos}@db:5432/lifeos
      LIFEOS_MODE: ${LIFEOS_MODE:-self-hosted}
      LIFEOS_SECRET: ${LIFEOS_SECRET:-please-change-me-in-production}
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: lifeos
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lifeos}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos"]
      interval: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
